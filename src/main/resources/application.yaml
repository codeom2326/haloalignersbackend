server:
  port: 8090
spring:
  application:
    name: halo-aligners
  datasource:
    url: ${DATASOURCE_URL:/haloaligners_db}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect