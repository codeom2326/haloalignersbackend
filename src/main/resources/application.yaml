server:
  port: 8090
spring:
  application:
    name: halo-aligners
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/haloaligners_db}
    username: ${DATASOURCE_USERNAME:omm}
    password: ${DATASOURCE_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect